<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍪 Cookie Klicker</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0a2e; --panel: #241540; --panel2: #321f56;
    --accent: #f5a623; --gold: #ffd700; --text: #f0e6ff;
    --text2: #a090c0; --green: #4ecb71; --border: rgba(255,255,255,0.07);
    --glow: 0 0 20px rgba(245,166,35,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); font-family: 'Nunito', sans-serif;
    color: var(--text); min-height: 100vh; overflow-x: hidden;
    background-image: radial-gradient(ellipse at 15% 60%, rgba(90,30,180,0.18) 0%, transparent 55%),
                      radial-gradient(ellipse at 85% 15%, rgba(245,166,35,0.07) 0%, transparent 50%);
  }
  h1 {
    font-family: 'Fredoka One', cursive; text-align: center;
    font-size: 2.4rem; padding: 18px 0 12px;
    background: linear-gradient(120deg, #ffd700, #f5a623, #ff9f43);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .layout {
    display: grid; grid-template-columns: 250px 1fr 300px;
    gap: 14px; max-width: 1160px; margin: 0 auto; padding: 0 14px 40px;
  }
  .panel { background: var(--panel); border-radius: 16px; padding: 18px 14px; border: 1px solid var(--border); }
  .panel-title {
    font-family: 'Fredoka One', cursive; font-size: 0.92rem; color: var(--accent);
    text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .stats-panel { position: sticky; top: 14px; height: fit-content; }
  .stat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .stat-label { color: var(--text2); }
  .stat-val { font-weight: 800; color: var(--gold); }
  .milestone-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.25);
    border-radius: 8px; padding: 4px 8px; font-size: 0.75rem; color: var(--gold);
    margin: 3px 2px; animation: popIn 0.35s ease;
  }
  @keyframes popIn { from{transform:scale(0.7);opacity:0} 60%{transform:scale(1.08)} to{transform:scale(1);opacity:1} }
  .cookie-area { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px; padding: 14px 0; }
  .cookie-count {
    font-family: 'Fredoka One', cursive; font-size: 3rem;
    background: linear-gradient(135deg, #fff 30%, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1; text-align: center;
  }
  .cps-display { font-size: 0.88rem; color: var(--text2); text-align: center; margin-top: 3px; }
  .cookie-btn {
    width: 190px; height: 190px; background: none; border: none;
    cursor: pointer; outline: none; filter: drop-shadow(0 0 28px rgba(245,166,35,0.5));
    transition: filter 0.15s; user-select: none;
  }
  .cookie-btn:active { filter: drop-shadow(0 0 10px rgba(245,166,35,0.3)); }
  .cookie-btn svg { transition: transform 0.08s; width: 100%; height: 100%; }
  .cookie-btn:hover svg { transform: rotate(4deg) scale(1.05); }
  .cookie-btn:active svg { transform: scale(0.92); }
  .particle {
    position: fixed; pointer-events: none; font-family: 'Fredoka One', cursive;
    font-size: 1rem; font-weight: 800; color: var(--gold);
    text-shadow: 0 0 8px rgba(255,215,0,0.6);
    animation: rise 0.85s ease-out forwards; z-index: 9999;
  }
  @keyframes rise { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-70px) scale(0.5)} }
  .powerups { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .pu-btn {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 8px 12px; color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.18s;
    text-align: center; min-width: 76px;
  }
  .pu-btn .pi { font-size: 1.35rem; display: block; }
  .pu-btn .pn { color: var(--text2); display: block; margin: 2px 0; }
  .pu-btn .pc { color: var(--gold); font-size: 0.72rem; }
  .pu-btn:hover:not(:disabled) { background: var(--panel2); border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--glow); }
  .pu-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .pu-btn.running { border-color: var(--green); background: rgba(78,203,113,0.1); }
  .shop-panel { position: sticky; top: 14px; height: calc(100vh - 110px); overflow-y: auto; display: flex; flex-direction: column; }
  .shop-panel::-webkit-scrollbar { width: 3px; }
  .shop-panel::-webkit-scrollbar-thumb { background: var(--panel2); border-radius: 2px; }
  .shop-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tab-btn {
    flex: 1; padding: 7px 4px; border: 1px solid var(--border); border-radius: 8px;
    background: transparent; color: var(--text2); font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 0.78rem; cursor: pointer; transition: all 0.18s;
  }
  .tab-btn.active { background: var(--accent); color: #1a0a2e; border-color: var(--accent); }
  .shop-item {
    display: flex; align-items: center; gap: 10px; padding: 9px 10px;
    border-radius: 10px; margin-bottom: 7px; border: 1px solid var(--border);
    background: rgba(255,255,255,0.02); cursor: pointer; transition: all 0.18s;
    overflow: hidden; position: relative;
  }
  .shop-item::after {
    content:''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(245,166,35,0.06), transparent);
    transform: translateX(-100%); transition: transform 0.35s;
  }
  .shop-item:hover::after { transform: translateX(100%); }
  .shop-item:hover:not(.locked) { border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.04); transform: translateX(3px); }
  .shop-item.locked { opacity: 0.4; cursor: not-allowed; }
  .shop-item.bought { border-color: rgba(78,203,113,0.3); }
  .item-icon { font-size: 1.7rem; flex-shrink: 0; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-weight: 800; font-size: 0.85rem; }
  .item-desc { font-size: 0.7rem; color: var(--text2); margin-top: 1px; }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-cost { font-family: 'Fredoka One', cursive; font-size: 0.88rem; color: var(--gold); }
  .item-owned { font-size: 0.7rem; color: var(--text2); }
  .item-owned b { color: var(--green); }
  .golden-cookie {
    position: fixed; font-size: 2.4rem; cursor: pointer; z-index: 500;
    filter: drop-shadow(0 0 14px gold); animation: floatGC 3s ease-in-out infinite;
    display: none; user-select: none;
  }
  .golden-cookie:hover { transform: scale(1.3) !important; }
  @keyframes floatGC { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-12px) rotate(5deg)} }
  .notif {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--panel), var(--panel2));
    border: 1px solid var(--gold); border-radius: 12px; padding: 11px 22px;
    font-weight: 800; color: var(--gold); font-size: 0.88rem;
    z-index: 9999; pointer-events: none; text-align: center;
    animation: slideNotif 0.3s ease, fadeNotif 0.3s ease 2.6s forwards;
  }
  @keyframes slideNotif { from{opacity:0;transform:translateX(-50%) translateY(16px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  @keyframes fadeNotif  { to{opacity:0;transform:translateX(-50%) translateY(-8px)} }
  @media (max-width: 860px) {
    .layout { grid-template-columns: 1fr; }
    .stats-panel,.shop-panel { position: static; height: auto; max-height: 400px; }
    .cookie-btn { width: 150px; height: 150px; }
    .cookie-count { font-size: 2.2rem; }
  }
</style>
</head>
<body>
<h1>🍪 Cookie Klicker</h1>
<div class="layout">
  <!-- LEFT -->
  <div class="panel stats-panel">
    <div class="panel-title">📊 Statistiken</div>
    <div class="stat-row"><span class="stat-label">Cookies</span><span class="stat-val" id="s-cookies">0</span></div>
    <div class="stat-row"><span class="stat-label">Pro Sekunde</span><span class="stat-val" id="s-cps">0</span></div>
    <div class="stat-row"><span class="stat-label">Pro Klick</span><span class="stat-val" id="s-cpc">1</span></div>
    <div class="stat-row"><span class="stat-label">Gesamt gebacken</span><span class="stat-val" id="s-total">0</span></div>
    <div class="stat-row"><span class="stat-label">Klicks</span><span class="stat-val" id="s-clicks">0</span></div>
    <div class="stat-row"><span class="stat-label">Gebäude</span><span class="stat-val" id="s-buildings">0</span></div>
    <div style="margin-top:18px;">
      <div class="panel-title">🏆 Meilensteine</div>
      <div id="milestone-area" style="font-size:0.78rem;color:var(--text2);">Noch keine erreicht...</div>
    </div>
  </div>
  <!-- CENTER -->
  <div class="cookie-area">
    <div>
      <div class="cookie-count" id="cookie-count">0</div>
      <div class="cps-display" id="cps-display">0 Cookies pro Sekunde</div>
    </div>
    <button class="cookie-btn" id="main-cookie" title="Klick mich!">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="cg1" cx="38%" cy="32%">
            <stop offset="0%" stop-color="#dfa070"/>
            <stop offset="55%" stop-color="#c07840"/>
            <stop offset="100%" stop-color="#915a20"/>
          </radialGradient>
          <radialGradient id="cg2" cx="50%" cy="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
            <stop offset="100%" stop-color="transparent"/>
          </radialGradient>
        </defs>
        <circle cx="100" cy="100" r="90" fill="url(#cg1)"/>
        <ellipse cx="78" cy="68" rx="38" ry="22" fill="url(#cg2)" opacity="0.55"/>
        <path d="M68 82 Q79 98 73 118" stroke="#6a3a12" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.55"/>
        <path d="M122 68 Q112 84 120 100 Q113 116 121 128" stroke="#6a3a12" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
        <path d="M52 122 Q68 112 83 122" stroke="#6a3a12" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.45"/>
        <ellipse cx="83"  cy="73"  rx="10" ry="7.5" fill="#2e1505" opacity="0.88" transform="rotate(-18,83,73)"/>
        <ellipse cx="122" cy="84"  rx="9"  ry="7"   fill="#2e1505" opacity="0.88" transform="rotate(12,122,84)"/>
        <ellipse cx="73"  cy="117" rx="9"  ry="7"   fill="#2e1505" opacity="0.85" transform="rotate(-8,73,117)"/>
        <ellipse cx="118" cy="122" rx="10" ry="7.5" fill="#2e1505" opacity="0.85" transform="rotate(22,118,122)"/>
        <ellipse cx="100" cy="96"  rx="8"  ry="6"   fill="#2e1505" opacity="0.85" transform="rotate(5,100,96)"/>
        <ellipse cx="58"  cy="92"  rx="8"  ry="6"   fill="#2e1505" opacity="0.80" transform="rotate(-12,58,92)"/>
        <ellipse cx="138" cy="110" rx="8"  ry="6"   fill="#2e1505" opacity="0.80" transform="rotate(18,138,110)"/>
        <ellipse cx="95"  cy="130" rx="7"  ry="5.5" fill="#2e1505" opacity="0.78" transform="rotate(3,95,130)"/>
        <circle cx="100" cy="100" r="90" fill="none" stroke="#6a3a12" stroke-width="3" opacity="0.35"/>
      </svg>
    </button>
    <div class="powerups">
      <button class="pu-btn" id="pu-frenzy" onclick="buyPU('frenzy')">
        <span class="pi">⚡</span><span class="pn">Raserei</span><span class="pc" id="pc-frenzy">50 🍪</span>
      </button>
      <button class="pu-btn" id="pu-storm" onclick="buyPU('storm')">
        <span class="pi">🌩️</span><span class="pn">Sturm</span><span class="pc" id="pc-storm">200 🍪</span>
      </button>
      <button class="pu-btn" id="pu-luck" onclick="buyPU('luck')">
        <span class="pi">🍀</span><span class="pn">Glück</span><span class="pc" id="pc-luck">100 🍪</span>
      </button>
      <button class="pu-btn" id="pu-combo" onclick="buyPU('combo')">
        <span class="pi">🔥</span><span class="pn">Kombo</span><span class="pc" id="pc-combo">500 🍪</span>
      </button>
    </div>
  </div>
  <!-- RIGHT -->
  <div class="panel shop-panel">
    <div class="shop-tabs">
      <button class="tab-btn active" id="tab-b" onclick="setTab('b')">🏗️ Gebäude</button>
      <button class="tab-btn" id="tab-u" onclick="setTab('u')">⬆️ Upgrades</button>
    </div>
    <div id="shop-buildings"></div>
    <div id="shop-upgrades" style="display:none;"></div>
  </div>
</div>
<div class="golden-cookie" id="golden-cookie" onclick="catchGolden()">✨🍪✨</div>

<script>
const BUILDINGS = [
  {id:'cursor',    icon:'🖱️', name:'Mauszeiger',     desc:'+0.1 CPS',   baseCost:15,     baseCPS:0.1},
  {id:'grandma',   icon:'👵', name:'Oma',             desc:'+0.5 CPS',   baseCost:100,    baseCPS:0.5},
  {id:'farm',      icon:'🌾', name:'Bauernhof',       desc:'+4 CPS',     baseCost:1100,   baseCPS:4},
  {id:'mine',      icon:'⛏️', name:'Mine',            desc:'+10 CPS',    baseCost:12000,  baseCPS:10},
  {id:'factory',   icon:'🏭', name:'Fabrik',          desc:'+40 CPS',    baseCost:130000, baseCPS:40},
  {id:'bank',      icon:'🏦', name:'Bank',            desc:'+100 CPS',   baseCost:1.4e6,  baseCPS:100},
  {id:'temple',    icon:'⛩️', name:'Tempel',          desc:'+400 CPS',   baseCost:20e6,   baseCPS:400},
  {id:'wizard',    icon:'🧙', name:'Zauberer-Turm',   desc:'+1600 CPS',  baseCost:330e6,  baseCPS:1600},
  {id:'spaceship', icon:'🚀', name:'Raumschiff',      desc:'+6500 CPS',  baseCost:5.1e9,  baseCPS:6500},
  {id:'portal',    icon:'🌀', name:'Portal',          desc:'+25000 CPS', baseCost:75e9,   baseCPS:25000},
];

const UPGRADES = [
  {id:'u1',  icon:'🖱️', name:'Bessere Mäuse',     desc:'Doppelter Klick-Wert',          cost:100,    req:()=>gs.clicks>=10,        eff:()=>{gs.clickMult*=2}},
  {id:'u2',  icon:'🍪', name:'Keksrezept I',       desc:'CPS ×1.1',                      cost:500,    req:()=>totalBld()>=5,        eff:()=>{gs.cpsMult*=1.1}},
  {id:'u3',  icon:'👵', name:'Oma lehrt backen',   desc:'Oma-CPS ×2',                    cost:1000,   req:()=>own('grandma')>=1,    eff:()=>{gs.bm.grandma*=2}},
  {id:'u4',  icon:'🖱️', name:'Titan-Klick',        desc:'Klick = 1% der CPS extra',      cost:5000,   req:()=>gs.clicks>=100,       eff:()=>{gs.clickCpsBonus=0.01}},
  {id:'u5',  icon:'🍪', name:'Keksrezept II',      desc:'CPS ×1.15',                     cost:10000,  req:()=>totalBld()>=20,       eff:()=>{gs.cpsMult*=1.15}},
  {id:'u6',  icon:'🌾', name:'Bio-Ernte',          desc:'Bauernhof-CPS ×2',              cost:20000,  req:()=>own('farm')>=5,       eff:()=>{gs.bm.farm*=2}},
  {id:'u7',  icon:'⛏️', name:'Diamantbohrer',      desc:'Mine-CPS ×2',                   cost:150000, req:()=>own('mine')>=5,       eff:()=>{gs.bm.mine*=2}},
  {id:'u8',  icon:'🖱️', name:'Quantenklick',       desc:'Klick-Wert ×4',                 cost:500000, req:()=>gs.clicks>=500,       eff:()=>{gs.clickMult*=4}},
  {id:'u9',  icon:'🍪', name:'Keksrezept III',     desc:'CPS ×1.2',                      cost:1e6,    req:()=>totalBld()>=50,       eff:()=>{gs.cpsMult*=1.2}},
  {id:'u10', icon:'🏭', name:'Automatisierung',    desc:'Fabrik-CPS ×2',                 cost:3e6,    req:()=>own('factory')>=5,    eff:()=>{gs.bm.factory*=2}},
  {id:'u11', icon:'🍪', name:'Göttlicher Teig',    desc:'Alle Gebäude ×1.5',             cost:50e6,   req:()=>totalBld()>=100,      eff:()=>{gs.cpsMult*=1.5}},
  {id:'u12', icon:'🖱️', name:'Zeitreise-Klick',    desc:'Klick-Wert ×8',                 cost:500e6,  req:()=>gs.clicks>=2000,      eff:()=>{gs.clickMult*=8}},
];

const POWERUPS = {
  frenzy: {icon:'⚡', name:'Raserei',  dur:15, baseCost:50,   cm:3, active:false, timer:0, eff:()=>{gs.fm=7},   end:()=>{gs.fm=1}},
  storm:  {icon:'🌩️', name:'Sturm',   dur:20, baseCost:200,  cm:4, active:false, timer:0, eff:()=>{gs.sm=3},   end:()=>{gs.sm=1}},
  luck:   {icon:'🍀', name:'Glück',   dur:30, baseCost:100,  cm:3, active:false, timer:0, eff:()=>{gs.luck=1}, end:()=>{gs.luck=0}},
  combo:  {icon:'🔥', name:'Kombo',   dur:10, baseCost:500,  cm:5, active:false, timer:0, eff:()=>{gs.cm=10},  end:()=>{gs.cm=1}},
};

const MILESTONES = [
  {id:'m1',  icon:'🍪', text:'Erste 100 Cookies!',       req:()=>gs.total>=100},
  {id:'m2',  icon:'🏗️', text:'Erstes Gebäude gebaut!',   req:()=>totalBld()>=1},
  {id:'m3',  icon:'🍪', text:'1.000 Cookies!',            req:()=>gs.total>=1000},
  {id:'m4',  icon:'👵', text:'Oma sagt Hallo!',           req:()=>own('grandma')>=1},
  {id:'m5',  icon:'🍪', text:'10.000 Cookies!',           req:()=>gs.total>=10000},
  {id:'m6',  icon:'🏗️', text:'10 Gebäude!',              req:()=>totalBld()>=10},
  {id:'m7',  icon:'🍪', text:'100.000 Cookies!',          req:()=>gs.total>=100000},
  {id:'m8',  icon:'🍀', text:'Dein erstes Power-Up!',     req:()=>gs.puUsed>=1},
  {id:'m9',  icon:'🍪', text:'1 Million Cookies!',        req:()=>gs.total>=1e6},
  {id:'m10', icon:'🏗️', text:'50 Gebäude!',              req:()=>totalBld()>=50},
  {id:'m11', icon:'🍪', text:'1 Milliarde Cookies!',      req:()=>gs.total>=1e9},
  {id:'m12', icon:'✨', text:'Goldener Keks gefangen!',   req:()=>gs.gc>=1},
  {id:'m13', icon:'🍪', text:'1 Billion Cookies!',        req:()=>gs.total>=1e12},
  {id:'m14', icon:'🏗️', text:'100 Gebäude!',             req:()=>totalBld()>=100},
];

const gs = {
  cookies:0, total:0, clicks:0,
  cpsMult:1, clickMult:1, fm:1, sm:1, cm:1,
  clickCpsBonus:0, luck:0, gc:0, puUsed:0,
  bldOwned:{}, bm:{}, puCount:{}, upgradesBought:new Set(), milestonesDone:new Set(),
};
BUILDINGS.forEach(b=>{gs.bldOwned[b.id]=0; gs.bm[b.id]=1;});
Object.keys(POWERUPS).forEach(k=>gs.puCount[k]=0);

function own(id){return gs.bldOwned[id]||0}
function totalBld(){return Object.values(gs.bldOwned).reduce((a,b)=>a+b,0)}
function getCPS(){
  let cps=0;
  BUILDINGS.forEach(b=>cps+=b.baseCPS*own(b.id)*(gs.bm[b.id]||1));
  return cps*gs.cpsMult*gs.fm*gs.sm;
}
function getCPC(){
  let c=gs.clickMult+getCPS()*gs.clickCpsBonus;
  return c*gs.fm*gs.cm;
}
function bldCost(b){return Math.ceil(b.baseCost*Math.pow(1.15,own(b.id)))}
function puCost(id){const p=POWERUPS[id];return Math.ceil(p.baseCost*Math.pow(p.cm,gs.puCount[id]||0))}
function fmt(n){
  if(n>=1e12)return(n/1e12).toFixed(2)+'B';
  if(n>=1e9) return(n/1e9).toFixed(2)+'Mrd';
  if(n>=1e6) return(n/1e6).toFixed(2)+'Mio';
  if(n>=1e3) return(n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}

function buyBuilding(id){
  const b=BUILDINGS.find(x=>x.id===id);
  const c=bldCost(b);
  if(gs.cookies<c)return;
  gs.cookies-=c; gs.bldOwned[id]++;
  notify(b.icon+' '+b.name+' gekauft!');
  renderShop(); checkMS();
}
function buyUpgrade(id){
  const u=UPGRADES.find(x=>x.id===id);
  if(!u||gs.upgradesBought.has(id)||gs.cookies<u.cost)return;
  gs.cookies-=u.cost; gs.upgradesBought.add(id); u.eff();
  notify('⬆️ '+u.name+' freigeschaltet!');
  renderShop();
}
function buyPU(id){
  if(POWERUPS[id].active)return;
  const c=puCost(id);
  if(gs.cookies<c)return;
  gs.cookies-=c; gs.puCount[id]++; gs.puUsed++;
  const p=POWERUPS[id];
  p.active=true; p.timer=p.dur; p.eff();
  document.getElementById('pu-'+id).classList.add('running');
  notify(p.icon+' '+p.name+' aktiviert! ('+p.dur+'s)');
  checkMS(); updPU();
}

document.getElementById('main-cookie').addEventListener('click',function(e){
  const earn=getCPC();
  gs.cookies+=earn; gs.total+=earn; gs.clicks++;
  spawnP(e.clientX,e.clientY,'+'+fmt(earn));
  if(gs.luck&&Math.random()<0.15){
    const b=getCPS()*5;
    gs.cookies+=b; gs.total+=b;
    spawnP(e.clientX,e.clientY-40,'🍀 +'+fmt(b),'#4ecb71');
  }
  checkMS();
});

function spawnP(x,y,t,c){
  const p=document.createElement('div'); p.className='particle'; p.textContent=t;
  if(c)p.style.color=c;
  p.style.left=(x+(Math.random()-0.5)*40)+'px';
  p.style.top=(y-20)+'px';
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),850);
}

let gcVis=false;
function showGolden(){
  if(gcVis)return; gcVis=true;
  const el=document.getElementById('golden-cookie');
  el.style.left=(10+Math.random()*75)+'%';
  el.style.top=(15+Math.random()*65)+'%';
  el.style.display='block';
  setTimeout(()=>{el.style.display='none';gcVis=false;},12000);
}
function catchGolden(){
  const b=Math.max(getCPS()*15,getCPC()*50);
  gs.cookies+=b; gs.total+=b; gs.gc++;
  document.getElementById('golden-cookie').style.display='none'; gcVis=false;
  notify('✨ Goldener Keks! +'+fmt(b)+' Cookies!');
  checkMS();
}
setInterval(()=>{if(Math.random()<0.3)showGolden();},20000);

function checkMS(){
  let ch=false;
  MILESTONES.forEach(m=>{
    if(!gs.milestonesDone.has(m.id)&&m.req()){
      gs.milestonesDone.add(m.id); ch=true;
      notify('🏆 Meilenstein: '+m.text);
    }
  });
  if(ch)renderMS();
}
function renderMS(){
  const el=document.getElementById('milestone-area');
  if(gs.milestonesDone.size===0){el.textContent='Noch keine erreicht...';return;}
  el.innerHTML='';
  MILESTONES.filter(m=>gs.milestonesDone.has(m.id)).forEach(m=>{
    const b=document.createElement('span');
    b.className='milestone-badge'; b.textContent=m.icon+' '+m.text;
    el.appendChild(b);
  });
}

function renderShop(){
  let h='';
  BUILDINGS.forEach(b=>{
    const c=bldCost(b); const n=own(b.id); const l=gs.cookies<c;
    h+=`<div class="shop-item${l?' locked':''}" onclick="buyBuilding('${b.id}')">
      <span class="item-icon">${b.icon}</span>
      <div class="item-info"><div class="item-name">${b.name}</div><div class="item-desc">${b.desc}</div></div>
      <div class="item-right"><div class="item-cost">${fmt(c)} 🍪</div><div class="item-owned">Besitz: <b>${n}</b></div></div>
    </div>`;
  });
  document.getElementById('shop-buildings').innerHTML=h;
  let uh='';
  UPGRADES.forEach(u=>{
    if(gs.upgradesBought.has(u.id)){
      uh+=`<div class="shop-item bought">
        <span class="item-icon">${u.icon}</span>
        <div class="item-info"><div class="item-name" style="color:var(--green)">✓ ${u.name}</div><div class="item-desc">${u.desc}</div></div>
        <div class="item-right"><div class="item-cost" style="color:var(--green)">Aktiv</div></div>
      </div>`;
      return;
    }
    const unl=u.req(); const ca=gs.cookies>=u.cost; const l=!unl||!ca;
    uh+=`<div class="shop-item${l?' locked':''}" onclick="buyUpgrade('${u.id}')">
      <span class="item-icon">${u.icon}</span>
      <div class="item-info"><div class="item-name">${unl?u.name:'???'}</div><div class="item-desc">${unl?u.desc:'Noch nicht verfügbar'}</div></div>
      <div class="item-right"><div class="item-cost">${unl?fmt(u.cost)+' 🍪':'🔒'}</div></div>
    </div>`;
  });
  document.getElementById('shop-upgrades').innerHTML=uh;
}

function setTab(t){
  document.getElementById('shop-buildings').style.display=t==='b'?'block':'none';
  document.getElementById('shop-upgrades').style.display=t==='u'?'block':'none';
  document.getElementById('tab-b').classList.toggle('active',t==='b');
  document.getElementById('tab-u').classList.toggle('active',t==='u');
}

function updPU(){
  Object.keys(POWERUPS).forEach(id=>{
    const p=POWERUPS[id]; const btn=document.getElementById('pu-'+id); const c=puCost(id);
    btn.disabled=p.active||gs.cookies<c;
    btn.classList.toggle('running',p.active);
    const pc=document.getElementById('pc-'+id);
    if(pc)pc.textContent=p.active?Math.ceil(p.timer)+'s ⏳':fmt(c)+' 🍪';
  });
}
function updStats(){
  const cps=getCPS(); const cpc=getCPC();
  document.getElementById('cookie-count').textContent=fmt(gs.cookies);
  document.getElementById('cps-display').textContent=fmt(cps)+' Cookies pro Sekunde';
  document.getElementById('s-cookies').textContent=fmt(gs.cookies);
  document.getElementById('s-cps').textContent=fmt(cps);
  document.getElementById('s-cpc').textContent=fmt(cpc);
  document.getElementById('s-total').textContent=fmt(gs.total);
  document.getElementById('s-clicks').textContent=fmt(gs.clicks);
  document.getElementById('s-buildings').textContent=totalBld();
}
function notify(msg){
  const n=document.createElement('div'); n.className='notif'; n.textContent=msg;
  document.body.appendChild(n); setTimeout(()=>n.remove(),3000);
}

let last=Date.now();
function loop(){
  const now=Date.now(); const dt=(now-last)/1000; last=now;
  const earn=getCPS()*dt;
  gs.cookies+=earn; gs.total+=earn;
  Object.keys(POWERUPS).forEach(id=>{
    const p=POWERUPS[id]; if(!p.active)return;
    p.timer-=dt;
    if(p.timer<=0){p.active=false;p.timer=0;p.end();document.getElementById('pu-'+id).classList.remove('running');notify(p.icon+' '+p.name+' beendet.');}
  });
  updStats(); updPU(); checkMS(); renderShop();
  requestAnimationFrame(loop);
}

renderShop(); renderMS(); loop();
</script>
</body>
</html>
